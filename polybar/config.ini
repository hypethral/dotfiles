[colors]
background = #00
background-alt = #f000000
foreground = #dfdfdf
primary = #f34
; secondary = #8ABEB7
alert = #bd2c40
; disabled = #707880

[bar/mybar]
width = 100%
height = 18pt
radius = 0

; dpi = 96


scroll-up = "#i3.prev"
scroll-down = "#i3.next"

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 4pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 0

module-margin = 1.8

separator =
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono-Bold:size 10;2
font-1 = FontAwesome6Free:style=Solid:size=10;4
font-2 = FontAwesome6Free:style=Regular:size=10;4
font-3 = FontAwesome6Brands:style=Regular:size=10;4


modules-left = xworkspaces xwindow
modules-right = brightness volume temperature battery date 

; cursor-click = pointer
; cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:140:...%

[module/brightness]
type = custom/script
exec = $HOME/.local/bin/brightness
interval = 5
signal = 10

[module/volume]
type = custom/script
exec = $HOME/.local/bin/volume
interval = 5
signal = 10

[module/temperature]
type = custom/script
exec = $HOME/.local/bin/temp
interval = 1

[module/battery]
type = custom/script
exec = $HOME/.local/bin/battery
interval = 180

[module/date]
type = custom/script
exec = $HOME/.local/bin/datey
interval = 60

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
