[colors]
background = #00
background-alt = #f000000
foreground = #dfdfdf
primary = #f34
; secondary = #8ABEB7
alert = #bd2c40
; disabled = #707880

[bar/mybar]
width = 100%
height = 21pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 0

module-margin = 1.8

separator =
separator-foreground = ${colors.disabled}

font-0 = JetBrains Mono:style=Bold:size 28;2
font-1 = FontAwesome6Free:style=Solid:size=12;2
font-2 = FontAwesome6Free:style=Regular:size=12;2
font-3 = FontAwesome6Brands:style=Regular:size=12;2

label-active-font = 0

modules-left = xworkspaces xwindow
modules-right = backlight pulseaudio temperature battery date 

; cursor-click = pointer
; cursor-scroll = ns-resize

enable-ipc = true

tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true
[module/xworkspaces]
type = internal/xworkspaces

label-active = %icon%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-active-font = 0
label-occupied = %icon%
label-occupied-padding = 1

label-urgent = %icon%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %icon%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

icon-0 = 1;I
icon-1 = 2;II
icon-2 = 3;III
icon-3 = 4;IV
icon-4 = 5;V
icon-5 = 6;VI
icon-6 = 7;VII
icon-7 = 8;IIV
icon-8 = 9;IV
icon-9 = 10;X
icon-default = X

[module/xwindow]
type = internal/xwindow
label = %title:0:69:...%
label-active-font = 0

[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
format = ÔÜÖ <label>
#format-underline = #444444

[module/pulseaudio]
type = internal/pulseaudio
sink = default
use-ui-max = true
interval = 4
format-volume = <ramp-volume> <label-volume>
label-muted = muted
label-muted-foreground = #666
ramp-volume-0 = ūüĒą
ramp-volume-1 = ūüĒä
click-right = pavucontrol
#format-volume-underline= #444444
#format-muted-underline= #444444




[module/temperature]
type = custom/script
exec = $HOME/.local/bin/temp
interval = 1
#format-underline = #444444
[module/battery]
type = custom/script
exec = $HOME/.local/bin/battery
interval = 180
#format-underline = #444444
[module/date]
type = custom/script
exec = $HOME/.local/bin/datey | lolcat
interval = 60
#format-underline = #444444
[settings]
screenchange-reload = true
pseudo-transparency = true
