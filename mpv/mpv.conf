# Linux
x11-bypass-compositor=yes
hwdec=vaapi

scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
target-trc=srgb
gamma-factor=1.2
# Cache
gpu-shader-cache-dir='/tmp/'
cache=yes
cache-on-disk=yes
cache-dir=/tmp/
cache-secs=60

# Deband
deband=yes # Default values are 1:64:16:48
deband-iterations=2 # Range 1-16. Higher = better quality but more GPU usage. >5 is redundant.
deband-threshold=64 # Range 0-4096. Deband strength.
deband-range=16 # Range 1-64. Range of deband. Too high may destroy details.
deband-grain=64 # Range 0-4096. Inject grain to cover up bad banding, higher value needed for poor sources.

# Audio
volume=100 # Set volume to 100% on startup.
volume-max=125 # Set player max vol to 100%

# Subtitles
sub-auto=fuzzy

[gpu]
vo=gpu
hwdec=nvdec
gpu-api=vulkan
