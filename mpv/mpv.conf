# Linux
hwdec=vaapi
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
target-trc=srgb
# Cache
gpu-shader-cache-dir='/tmp/'
cache=yes
cache-secs=60

# Deband
#deband=yes # Default values are 1:64:16:48
#deband-iterations=4 # Range 1-16. Higher = better quality but more GPU usage. >5 is redundant.
#deband-threshold=128 # Range 0-4096. Deband strength.
#deband-range=12 # Range 1-64. Range of deband. Too high may destroy details.
#deband-grain=32 # Range 0-4096. Inject grain to cover up bad banding, higher value needed for poor sources.

# Audio
volume=100 # Set volume to 100% on startup.
volume-max=125 # Set player max vol to 100%

# Subtitles
sub-auto=fuzzy
sub-font="JetBrains Mono"
sub-bold=no
sub-font-size=28
[gpu]
vo=gpu
hwdec=nvdec
gpu-api=vulkan
